name: CI - Python Windows x86 tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for main branch
  cancel-in-progress: ${{ github.ref != 'main' }}

jobs:
  run-tests:
    name: "Python Windows x86 tests. Runner ${{ matrix.job_info.runner }}"
    defaults:
      run:
        # Explicitly set the shell to bash
        shell: bash
    strategy:
      matrix:
        job_info: [
          {
            runner: "windows-x86-n2-16",
            container: null,
          },
        ]
    runs-on: ${{ matrix.job_info.runner }}
    container:
      image: ${{ matrix.job_info.container }}
    steps:
      - uses: actions/checkout@v5

      - run: echo "Building / running tests..."
      - run: |
          bazel --output_user_root=C:/_rmt test \
          --repo_env=USE_PYWRAP_RULES=True \
          --verbose_failures \
          --test_output=errors \
          --color=yes \
          --enable_runfiles \
          //py/tests/pybind:all
      - run: |
          bazel --output_user_root=C:/_rmt test \
          --repo_env=USE_PYWRAP_RULES=True \
          --verbose_failures \
          --test_output=errors \
          --color=yes \
          --enable_runfiles \
          //py/tests/pybind_external:all

      - run: echo "Bzlmod. Building / running tests..."
      - run: |
          bazel --output_user_root=C:/_rmt test \
            --repo_env=USE_PYWRAP_RULES=True \
            --verbose_failures \
            --test_output=errors \
            --color=yes \
            --enable_runfiles \
            --config=bzlmod \
            //py/tests/pybind:all
      - run: |
          bazel --output_user_root=C:/_rmt test \
            --repo_env=USE_PYWRAP_RULES=True \
            --verbose_failures \
            --test_output=errors \
            --color=yes \
            --enable_runfiles \
            --config=bzlmod \
            //py/tests/pybind_external:all
