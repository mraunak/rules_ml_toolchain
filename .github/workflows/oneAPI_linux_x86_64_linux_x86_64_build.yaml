name: oneAPI Linux x86_64 -> Linux x86_64 build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    name: "oneAPI Linux x86_64 -> Linux x86_64 build. Runner ${{ matrix.runner }}"
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: linux-x86-n2-16
            container: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest

    runs-on: ${{ matrix.runner }}

    container:
      image: ${{ matrix.container }}

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Test oneAPI GPU code compilation hermetic SYCL
        run: |
          bazel build --color=yes \
            --config=sycl_hermetic \
            --repo_env=ONEAPI_VERSION=2025.1 \
            --repo_env=OS=ubuntu_24.10 \
            //cc/tests/gpu/sycl:all

      - name: Test host CPU code compilation with oneAPI toolchain
        run: |
          bazel test --color=yes \
            --config=sycl_hermetic \
            --repo_env=ONEAPI_VERSION=2025.1 \
            --repo_env=OS=ubuntu_24.10 \
            //cc/tests/cpu:all

      - name: Test SYCL GPU code compilation bzlmod
        run: |
          bazel build --color=yes \
            --config=sycl_hermetic \
            --repo_env=ONEAPI_VERSION=2025.1 \
            --repo_env=OS=ubuntu_24.10 \
            --config=bzlmod \
            //cc/tests/gpu/sycl:all

      - name: Test host CPU code compilation bzlmod
        run: |
          bazel test --color=yes \
            --config=sycl_hermetic \
            --repo_env=ONEAPI_VERSION=2025.1 \
            --repo_env=OS=ubuntu_24.10 \
            --config=bzlmod \
            //cc/tests/cpu:all
