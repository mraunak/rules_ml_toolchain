name: CI - Python Linux x86_64 tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for main branch
  cancel-in-progress: ${{ github.ref != 'main' }}

jobs:
  run-tests:
    name: "Python Linux x86_64 tests. Runner ${{ matrix.job_info.runner }}"
    defaults:
      run:
        # Explicitly set the shell to bash
        shell: bash
    strategy:
      matrix:
        job_info: [
          {
            runner: "linux-x86-n2-16",
            container: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest",
          },
        ]
    # Use self-hosted runners. For a Linux runner, a corresponding container image used for the
    # workflow is required.
    # See go/ml-github-actions/getting_started/using_runners.md#supported-runner-scale-set.
    runs-on: ${{ matrix.job_info.runner }}
    container:
      image: ${{ matrix.job_info.container }}
    steps:
      - uses: actions/checkout@v5

      - run: echo "Building / running tests..."
      - run: |
          bazel test --repo_env=USE_PYWRAP_RULES=True \
          --verbose_failures \
          --test_output=errors \
          --color=yes \
          //py/tests/pybind:all
      - run: |
          bazel test --repo_env=USE_PYWRAP_RULES=True \
          --verbose_failures \
          --test_output=errors \
          --color=yes \
          //py/tests/pybind_external:all

      - run: echo "Bzlmod. Building / running tests..."
      - run: |
          bazel test --repo_env=USE_PYWRAP_RULES=True \
          --verbose_failures \
          --test_output=errors \
          --color=yes \
          --config=bzlmod \
          //py/tests/pybind:all
      - run: |
          bazel test --repo_env=USE_PYWRAP_RULES=True \
          --verbose_failures \
          --test_output=errors \
          --color=yes \
          --config=bzlmod \
          //py/tests/pybind_external:all